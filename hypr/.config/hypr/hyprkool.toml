# hyprkool — KDE-style activities with 2D workspace grid
# Docs: https://github.com/thrombe/hyprkool

# Named activities — switch between project contexts
activities = ["work", "personal", "comms"]

# Workspace grid dimensions [columns, rows]
workspaces = [3, 2]

# Harpoon-style bookmarks: quick jump to specific spots
# named_focii = { "1" = "work:(1 1)", "2" = "comms:(1 1)" }

[daemon]
remember_activity_focus = true
fallback_commands = true
move_monitors_to_hyprkool_activity = true
focus_last_window_on_monitor_change = false

[daemon.mouse]
switch_workspace_on_edge = false
polling_rate = 300
edge_width = 0
edge_margin = 2
