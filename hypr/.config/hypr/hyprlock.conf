background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
    noise = 0.02
}

# Time
label {
    monitor =
    text = $TIME
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    color = rgba(198, 208, 245, 1.0)
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    color = rgba(181, 191, 226, 1.0)
    position = 0, 100
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = rgba(140, 170, 238, 1.0)
    position = 0, -75
    halign = center
    valign = center
}

# Battery
label {
    monitor =
    text = cmd[update:10000] cat /sys/class/power_supply/BAT0/capacity 2>/dev/null | xargs -I{} echo "󰁹 {}%" || echo ""
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgba(166, 209, 137, 1.0)
    position = -30, -30
    halign = right
    valign = top
}

# Network
label {
    monitor =
    text = cmd[update:10000] nmcli -t -f NAME connection show --active 2>/dev/null | head -1 | xargs -I{} echo "󰤨 {}" || echo "󰤭"
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgba(153, 209, 219, 1.0)
    position = -30, -55
    halign = right
    valign = top
}

# Caps Lock
label {
    monitor =
    text = cmd[update:250] if [ "$(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | head -1)" = "1" ]; then echo "CAPS LOCK"; fi
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgba(229, 200, 144, 1.0)
    position = 0, -220
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgba(140, 170, 238, 1.0)
    inner_color = rgba(48, 52, 70, 1.0)
    font_color = rgba(198, 208, 245, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 15
    check_color = rgba(166, 209, 137, 1.0)
    fail_color = rgba(231, 130, 132, 1.0)
    fail_text = <i>$FAIL</i>
    fail_timeout = 2000
    capslock_color = rgba(229, 200, 144, 1.0)
    position = 0, -150
    halign = center
    valign = center
}
