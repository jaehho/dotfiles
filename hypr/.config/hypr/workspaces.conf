# Workspace-to-monitor assignment (round-robin, physical left to right).
# Pattern per desktop: ws 1,4,7,10 → left;  ws 2,5,8 → middle;  ws 3,6,9 → right.
# Each desktop uses an offset of 10: desk 1 = 1–10, desk 2 = 11–20, etc.
#
# Managed by: hypr-desktop script

$mon_left  = desc:Dell Inc. DELL P2219H FT36ZS2
$mon_mid   = desc:Dell Inc. DELL P2219H B946ZS2
$mon_right = desc:BOE 0x0D5C 0x0000FFA1

# Desktop 1 (workspaces 1–10)
workspace = 1, monitor:$mon_left, default:true
workspace = 2, monitor:$mon_mid, default:true
workspace = 3, monitor:$mon_right, default:true
workspace = 4, monitor:$mon_left
workspace = 5, monitor:$mon_mid
workspace = 6, monitor:$mon_right
workspace = 7, monitor:$mon_left
workspace = 8, monitor:$mon_mid
workspace = 9, monitor:$mon_right
workspace = 10, monitor:$mon_left

# Desktop 2 (workspaces 11–20)
workspace = 11, monitor:$mon_left
workspace = 12, monitor:$mon_mid
workspace = 13, monitor:$mon_right
workspace = 14, monitor:$mon_left
workspace = 15, monitor:$mon_mid
workspace = 16, monitor:$mon_right
workspace = 17, monitor:$mon_left
workspace = 18, monitor:$mon_mid
workspace = 19, monitor:$mon_right
workspace = 20, monitor:$mon_left

# Desktop 3 (workspaces 21–30)
workspace = 21, monitor:$mon_left
workspace = 22, monitor:$mon_mid
workspace = 23, monitor:$mon_right
workspace = 24, monitor:$mon_left
workspace = 25, monitor:$mon_mid
workspace = 26, monitor:$mon_right
workspace = 27, monitor:$mon_left
workspace = 28, monitor:$mon_mid
workspace = 29, monitor:$mon_right
workspace = 30, monitor:$mon_left

# Desktop 4 (workspaces 31–40)
workspace = 31, monitor:$mon_left
workspace = 32, monitor:$mon_mid
workspace = 33, monitor:$mon_right
workspace = 34, monitor:$mon_left
workspace = 35, monitor:$mon_mid
workspace = 36, monitor:$mon_right
workspace = 37, monitor:$mon_left
workspace = 38, monitor:$mon_mid
workspace = 39, monitor:$mon_right
workspace = 40, monitor:$mon_left

# Desktop 5 (workspaces 41–50)
workspace = 41, monitor:$mon_left
workspace = 42, monitor:$mon_mid
workspace = 43, monitor:$mon_right
workspace = 44, monitor:$mon_left
workspace = 45, monitor:$mon_mid
workspace = 46, monitor:$mon_right
workspace = 47, monitor:$mon_left
workspace = 48, monitor:$mon_mid
workspace = 49, monitor:$mon_right
workspace = 50, monitor:$mon_left
