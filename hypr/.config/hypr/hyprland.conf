# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/colors.conf


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar 2>&1 | grep -v 'Gtk-CRITICAL\|GTK_IS_ACCEL_GROUP' &
exec-once = awww-daemon
exec-once = sleep 1 && ~/.local/bin/hypr-wallpaper restore
exec-once = sleep 1 && ~/.local/bin/hypr-wallpaper watch
exec-once = mako
exec-once = hypridle
exec-once = swayosd-server
exec-once = udiskie --no-automount --smart-tray
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.local/bin/hypr-battery-monitor &
exec-once = teams-for-linux

# Workspace management daemons
exec-once = hyprpm reload -n
exec-once = hypr-desktop init
exec-once = hypr-desktop watch
exec-once = hyprscratch init
# hypr-monitor-hotplug disabled — virtual-desktops plugin manages workspace↔monitor mapping
# exec-once = ~/.local/bin/hypr-monitor-hotplug watch
exec-once = hyprwhenthen run


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# GPU — hybrid Intel/NVIDIA (Intel primary, NVIDIA via prime-run)
env = LIBVA_DRIVER_NAME,iHD
env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1

# Firefox
env = MOZ_ENABLE_WAYLAND,1

# Electron/Chromium
env = ELECTRON_OZONE_PLATFORM_HINT,auto


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(bin|local/bin)/hyprlock, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20
    gaps_workspaces = 50

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $clr_active_1 $clr_active_2 45deg
    col.inactive_border = $clr_inactive

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = dwindle

    snap {
        enabled = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = $clr_shadow
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2

        popups = true
        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
    animation = borderangle,   1,     100,   linear,       loop
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.8
}

# Scratchpads (hyprscratch): semi-transparent overlay
workspace = special:term, gapsout:30
workspace = special:music, gapsout:30
windowrule {
    name = scratchpad-see-through
    match:workspace = special:term
    opacity = 0.85
}
windowrule {
    name = scratchpad-music-see-through
    match:workspace = special:music
    opacity = 0.85
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    middle_click_paste = false
    focus_on_activate = true
    allow_session_lock_restore = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    swallow_exception_regex = ^(org\.pwmt\.zathura)$
}

cursor {
    no_hardware_cursors = 1
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    repeat_rate = 50
    repeat_delay = 300

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }

}

# Touchpad gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, env TMUX=fake $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod SHIFT, P, exec, ~/.local/bin/hypr-pin-toggle # sticky window (visible on all workspaces)
bind = $mainMod, T, layoutmsg, togglesplit # dwindle

# Screenshots (SUPER = active window, ALT = satty, SHIFT = region select)
bind = , Print, exec, grim - | wl-copy
bind = ALT, Print, exec, grim - | satty -f -
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = ALT SHIFT, Print, exec, grim -g "$(slurp)" - | satty -f -
bind = $mainMod, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | wl-copy
bind = $mainMod ALT, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | satty -f -

# Clipboard history
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy && sleep 0.05 && if hyprctl activewindow -j | jq -r '.class' | grep -qiE '^(kitty|foot|Alacritty|wezterm)$'; then wtype -M ctrl -M shift v; else wtype -M ctrl v; fi

# Lock screen
bind = $mainMod, escape, exec, loginctl lock-session


# Fullscreen
bind = $mainMod, F, fullscreen, 0

# Browser
bind = $mainMod, W, exec, firefox-developer-edition

# Toggle waybar
bind = $mainMod, B, exec, pkill waybar || waybar 2>&1 | grep -v 'Gtk-CRITICAL\|GTK_IS_ACCEL_GROUP' &

# Notifications
bind = $mainMod, period, exec, ~/.local/bin/hypr-focus-notification
bind = $mainMod SHIFT, N, exec, ~/.local/bin/hypr-dnd-toggle

# Game mode (disable effects for performance)
bind = $mainMod SHIFT, G, exec, ~/.local/bin/hypr-gamemode

# Night light (blue light filter)
bind = $mainMod SHIFT, T, exec, ~/.local/bin/hypr-nightlight-toggle

# Keybind cheatsheet
bind = $mainMod, slash, exec, ~/.local/bin/hypr-keybind-cheatsheet

# Wallpaper manager
bind = $mainMod ALT, W, exec, ~/.local/bin/hypr-wallpaper menu

# Emoji picker
bind = $mainMod, comma, exec, ~/.local/bin/hypr-emoji-picker

# Theme picker
bind = $mainMod ALT, T, exec, ~/.local/bin/hypr-theme-picker

# Settings menu (Wi-Fi, Bluetooth, Audio, Display, Appearance, System Monitor)
bind = $mainMod, semicolon, exec, ~/.local/bin/hypr-settings-menu

# Read screen aloud (toggle — press again to stop)
bind = $mainMod SHIFT, R, exec, ~/.local/bin/hypr-read-screen

# Move all windows on current workspace to target workspace (desktop-aware)
bind = $mainMod CTRL, 1, exec, hypr-desktop moveall 1
bind = $mainMod CTRL, 2, exec, hypr-desktop moveall 2
bind = $mainMod CTRL, 3, exec, hypr-desktop moveall 3
bind = $mainMod CTRL, 4, exec, hypr-desktop moveall 4
bind = $mainMod CTRL, 5, exec, hypr-desktop moveall 5
bind = $mainMod CTRL, 6, exec, hypr-desktop moveall 6
bind = $mainMod CTRL, 7, exec, hypr-desktop moveall 7
bind = $mainMod CTRL, 8, exec, hypr-desktop moveall 8
bind = $mainMod CTRL, 9, exec, hypr-desktop moveall 9
bind = $mainMod CTRL, 0, exec, hypr-desktop moveall 10

# Move focus with mainMod + hjkl
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Swap windows with mainMod + SHIFT + hjkl
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

# Switch workspaces with mainMod + [0-9] (desktop-aware)
bind = $mainMod, 1, exec, hypr-desktop ws 1
bind = $mainMod, 2, exec, hypr-desktop ws 2
bind = $mainMod, 3, exec, hypr-desktop ws 3
bind = $mainMod, 4, exec, hypr-desktop ws 4
bind = $mainMod, 5, exec, hypr-desktop ws 5
bind = $mainMod, 6, exec, hypr-desktop ws 6
bind = $mainMod, 7, exec, hypr-desktop ws 7
bind = $mainMod, 8, exec, hypr-desktop ws 8
bind = $mainMod, 9, exec, hypr-desktop ws 9
bind = $mainMod, 0, exec, hypr-desktop ws 10

# Move active window to a workspace with mainMod + SHIFT + [0-9] (desktop-aware)
bind = $mainMod SHIFT, 1, exec, hypr-desktop movews 1
bind = $mainMod SHIFT, 2, exec, hypr-desktop movews 2
bind = $mainMod SHIFT, 3, exec, hypr-desktop movews 3
bind = $mainMod SHIFT, 4, exec, hypr-desktop movews 4
bind = $mainMod SHIFT, 5, exec, hypr-desktop movews 5
bind = $mainMod SHIFT, 6, exec, hypr-desktop movews 6
bind = $mainMod SHIFT, 7, exec, hypr-desktop movews 7
bind = $mainMod SHIFT, 8, exec, hypr-desktop movews 8
bind = $mainMod SHIFT, 9, exec, hypr-desktop movews 9
bind = $mainMod SHIFT, 0, exec, hypr-desktop movews 10

# Scratchpads (via hyprscratch — multiple named scratchpads)
bind = $mainMod, S, exec, hyprscratch toggle term
bind = $mainMod SHIFT, S, exec, hyprscratch toggle music
bind = $mainMod ALT, S, exec, hyprscratch cycle
bind = $mainMod CTRL SHIFT, S, exec, hyprscratch hide-all

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Monitor management
bind = $mainMod SHIFT, M, exec, nwg-displays

# Move project (all windows + name) to next/prev monitor's empty slot
bind = $mainMod CTRL, right, exec, ~/.local/bin/hypr-move-project next
bind = $mainMod CTRL, left,  exec, ~/.local/bin/hypr-move-project prev

# Workspace overview (hyprtasking plugin)
bind = $mainMod, grave, hyprtasking:toggle, all
bind = , escape, hyprtasking:if_active, hyprtasking:toggle all
bind = , h, hyprtasking:if_active, hyprtasking:move left
bind = , j, hyprtasking:if_active, hyprtasking:move down
bind = , k, hyprtasking:if_active, hyprtasking:move up
bind = , l, hyprtasking:if_active, hyprtasking:move right

plugin {
    hyprtasking {
        exit_on_hovered = false
    }
}

# --- Named workspaces (rofi) ---
$ws_mgr = ~/.local/bin/hypr-dynamic-workspaces

bind = $mainMod, Z,           exec, $ws_mgr --workspace-switcher
bind = $mainMod SHIFT, Z,     exec, $ws_mgr --move-window
bind = $mainMod, BackSpace,   exec, $ws_mgr --delete-current-workspace
bind = $mainMod ALT, space,   exec, $ws_mgr --window-switcher

# Sequential workspace navigation (desktop-contained)
bind = $mainMod, Tab,         exec, hypr-desktop tab
bind = $mainMod SHIFT, Tab,   exec, hypr-desktop tab prev

# --- Virtual desktops (hypr-desktop) ---
bind = $mainMod, D,              exec, hyprctl clients -j | jq -e '.[] | select(.class == "hypr-desktop-menu")' >/dev/null 2>&1 && hyprctl dispatch focuswindow class:hypr-desktop-menu || kitty --class hypr-desktop-menu --title Desktops -e hypr-desktop-menu
bind = $mainMod, X,              exec, hypr-desktop rename
bind = $mainMod SHIFT, D,        exec, hypr-desktop delete
bind = $mainMod ALT, Right,      exec, hypr-desktop next
bind = $mainMod ALT, Left,       exec, hypr-desktop prev
bind = $mainMod ALT SHIFT, Right, exec, hypr-desktop sendtodesktop next
bind = $mainMod ALT SHIFT, Left,  exec, hypr-desktop sendtodesktop prev


# Resize submap (SUPER+A to enter, hjkl to resize, Esc to exit)
bind = $mainMod, A, submap, resize
submap = resize
binde = , h, resizeactive, -10 0
binde = , l, resizeactive, 10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset

# Volume (SwayOSD with fallback)
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise 2>/dev/null || wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower 2>/dev/null || wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle 2>/dev/null || wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle 2>/dev/null || wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness (SwayOSD with fallback)
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise 2>/dev/null || brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower 2>/dev/null || brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Picture-in-Picture
windowrule {
    name = pip-float
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)$

    float = true
    pin = true
    keep_aspect_ratio = true
    size = 25% 25%
    move = 73% 72%
}

# Inhibit idle when fullscreen (browsers, media players)
windowrule {
    name = idle-inhibit-fullscreen
    match:fullscreen = true
    match:class = ^(firefox-developer-edition|firefox|microsoft-edge.*|chromium|brave-browser|mpv|vlc|celluloid)$

    suppress_event = idle
}

# Float common dialogs
windowrule {
    name = float-dialogs
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|org.gnome.Calculator|xdg-desktop-portal-gtk)$

    float = true
}

windowrule {
    name = float-file-dialogs
    match:title = ^(Open File|Save File|Save As|Confirm|File Upload)$

    float = true
}

# Floating TUI apps (nmtui, btop, etc.)
windowrule {
    name = float-tui
    match:class = ^(floating-tui)$

    float = true
    size = 800 600
    center = true
}

# Desktop manager popup
windowrule {
    name = desktop-menu
    match:class = ^(hypr-desktop-menu)$

    float = true
    size = 450 320
    center = true
}

# Thunderbird — float compose/reply windows, keep main tiled
windowrule {
    name = thunderbird-compose-float
    match:class = ^(thunderbird)$
    match:title = ^(Write:|Re:|Fwd:)

    float = true
    size = 800 600
    center = true
}

#####################
### LAYER RULES ###
#####################

layerrule = blur on, xray on, ignore_alpha 0.5, match:namespace waybar
layerrule = blur on, ignore_alpha 0.5, match:namespace notifications
