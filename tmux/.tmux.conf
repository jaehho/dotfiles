# =============================================================================
# SHELL
# =============================================================================
set -g default-shell /usr/bin/fish

# =============================================================================
# PREFIX
# =============================================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# =============================================================================
# GENERAL
# =============================================================================
set -g mode-keys vi
set -g mouse on
set -g history-limit 50000
set -g focus-events on
set -g update-environment "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY"
set -ga terminal-overrides ",*:Tc"
set -s extended-keys always
set -as terminal-features 'xterm-kitty:extkeys'
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-hook -g session-created 'run-shell "n=1; for sid in $(tmux ls -F \"##{session_id}:##{session_name}\" | grep -E \":[0-9]+$\" | sort -t: -k2 -n | cut -d: -f1); do tmux rename-session -t \"\$sid\" \"\$n\"; n=\$((n+1)); done"'
set-hook -g session-closed 'run-shell "n=1; for sid in $(tmux ls -F \"##{session_id}:##{session_name}\" | grep -E \":[0-9]+$\" | sort -t: -k2 -n | cut -d: -f1); do tmux rename-session -t \"\$sid\" \"\$n\"; n=\$((n+1)); done"'
set -gq allow-passthrough on
set -g set-clipboard on
set -g visual-activity off

# =============================================================================
# KEY BINDINGS
# =============================================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

bind T next-layout


# =============================================================================
# COPY MODE
# =============================================================================
bind -T copy-mode-vi v send-keys -X begin-selection

# =============================================================================
# CATPPUCCIN
# =============================================================================
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #{pane_current_command}"
set -g @catppuccin_window_current_text " #{pane_current_command}"

# =============================================================================
# PLUGINS
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
# On X11 (no Wayland), override tmux-yank to use xclip instead of wl-copy
if-shell '[ -z "$WAYLAND_DISPLAY" ]' \
  'set -g @override_copy_command "xclip -selection clipboard"'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: save/restore pane contents and processes
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# =============================================================================
# STATUS BAR (custom colors → catppuccin plugin → status, then TPM)
# =============================================================================
# Custom theme colors take precedence (catppuccin plugin uses set -o, won't override)
source-file -q ~/.config/theme/tmux-colors.conf
run '~/.tmux/plugins/tmux/catppuccin.tmux'

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[bg=#{@thm_yellow}#,fg=#{@thm_crust}] PREFIX #[default] ,}#{?window_zoomed_flag,#[bg=#{@thm_blue}#,fg=#{@thm_crust}] ZOOM #[default] ,}#{?#{==:#{pane_mode},copy-mode},#[bg=#{@thm_green}#,fg=#{@thm_crust}] COPY #[default] ,#{?#{==:#{pane_mode},tree-mode},#[bg=#{@thm_green}#,fg=#{@thm_crust}] PICK #[default] ,#{?#{==:#{pane_mode},buffer-mode},#[bg=#{@thm_green}#,fg=#{@thm_crust}] PASTE #[default] ,#{?#{==:#{pane_mode},clock-mode},#[bg=#{@thm_green}#,fg=#{@thm_crust}] CLOCK #[default] ,}}}}"
set -g status-right "#{E:@catppuccin_status_host}#{E:@catppuccin_status_session}"

# =============================================================================
# TPM (keep at bottom)
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
