# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Emoji fallback (Noto Color Emoji)
symbol_map U+200D,U+2049,U+2122,U+2139 Noto Color Emoji
symbol_map U+2194-U+21AA Noto Color Emoji
symbol_map U+231A-U+23FF Noto Color Emoji
symbol_map U+2460-U+24FF Noto Color Emoji
symbol_map U+25AA-U+25FE Noto Color Emoji
symbol_map U+2600-U+27BF Noto Color Emoji
symbol_map U+2900-U+297F Noto Color Emoji
symbol_map U+2934-U+2935 Noto Color Emoji
symbol_map U+2B00-U+2BFF Noto Color Emoji
symbol_map U+3030,U+303D,U+3297,U+3299 Noto Color Emoji
symbol_map U+FE00-U+FE0F Noto Color Emoji
symbol_map U+1F000-U+1FAFF Noto Color Emoji

# Window
window_padding_width 14
hide_window_decorations yes
remember_window_size yes
confirm_os_window_close 0

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor_trail 3

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Bell
enable_audio_bell no
visual_bell_duration 0

# Shell
shell fish

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{fmt.fg.tab}{index}: {title}{fmt.fg.tab}{' [%d]' % num_windows if num_windows > 1 else ''}"

# URL handling — Ctrl+click opens URLs (works inside tmux where mouse is grabbed)
detect_urls yes
mouse_map ctrl+left click ungrabbed mouse_handle_click link
mouse_map ctrl+left click grabbed mouse_handle_click link

# Shift+Enter sends CSI u sequence so Fish can distinguish it from Enter
map shift+enter send_text all \x1b[13;2u

# Performance (Wayland)
wayland_enable_ime no

# Catppuccin Frappe
foreground              #c6d0f5
background              #303446
selection_foreground     #303446
selection_background     #f2d5cf
cursor                  #f2d5cf
cursor_text_color       #303446
url_color               #8caaee

# Tabs
active_tab_foreground   #232634
active_tab_background   #ca9ee6
inactive_tab_foreground #c6d0f5
inactive_tab_background #414559

# Marks
mark1_foreground #303446
mark1_background #babbf1

# ANSI colors
# black
color0  #51576d
color8  #626880
# red
color1  #e78284
color9  #e78284
