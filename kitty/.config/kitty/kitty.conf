# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Emoji: Nerd Font handles symbols (U+2000-U+2BFF) with monochrome glyphs.
# Kitty auto-falls back to Noto Color Emoji for anything the Nerd Font lacks.
# Only force Noto Color Emoji for modern emoji blocks that should be colored.
symbol_map U+1F000-U+1FAFF Noto Color Emoji
symbol_map U+FE00-U+FE0F Noto Color Emoji
symbol_map U+200D Noto Color Emoji

# Window
window_padding_width 14
hide_window_decorations yes
remember_window_size yes
confirm_os_window_close 0

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor_trail 3

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Bell
enable_audio_bell no
visual_bell_duration 0

# Shell
shell fish

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{fmt.fg.tab}{index}: {title}{fmt.fg.tab}{' [%d]' % num_windows if num_windows > 1 else ''}"

# URL handling — Ctrl+click opens URLs (works inside tmux where mouse is grabbed)
detect_urls yes
mouse_map ctrl+left click ungrabbed mouse_handle_click link
mouse_map ctrl+left click grabbed mouse_handle_click link

# Shift+Enter sends CSI u sequence so Fish can distinguish it from Enter
map shift+enter send_text all \x1b[13;2u

# Performance (Wayland)
wayland_enable_ime no
input_delay 0

# Colors — generated by theme-apply from ~/.config/theme/palette
include colors.conf
