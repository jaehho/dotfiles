# Disable nvidia framebuffer device — prevents black screen on hybrid laptops
# where the display panel is wired through the Intel iGPU.
# (fbdev defaults to ON since driver 570.x when modeset is enabled)
options nvidia_drm fbdev=0
options nvidia NVreg_DynamicPowerManagement=0x00
# Preserve VRAM across suspend/hibernate. Requires proprietary nvidia (ships
# /proc/driver/nvidia/suspend), where nvidia-sleep.sh writes it pre-sleep so
# the kernel's pm_freeze sees preserved state. Must not be set on nvidia-open
# — the procfs file doesn't exist there, so pci_pm_freeze returns -5.
options nvidia NVreg_PreserveVideoMemoryAllocations=1
# Disable GSP firmware. Silently ignored on nvidia-open (no non-GSP code path
# exists), honored on proprietary nvidia. Avoids GSP heartbeat dying in s2idle.
options nvidia NVreg_EnableGpuFirmware=0
