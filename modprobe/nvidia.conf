# Disable nvidia framebuffer device — prevents black screen on hybrid laptops
# where the display panel is wired through the Intel iGPU.
# (fbdev defaults to ON since driver 570.x when modeset is enabled)
options nvidia_drm fbdev=0
options nvidia NVreg_DynamicPowerManagement=0x00
# NVreg_PreserveVideoMemoryAllocations is intentionally NOT set: it only works
# if userspace writes /proc/driver/nvidia/suspend before sleep, but nvidia-open
# doesn't expose that procfs file, so setting =1 is a no-op that still triggers
# pci_pm_freeze to return -5 during hibernate resume. See BOOT_ISSUES.md
# 2026-04-15 entries. Trade-off: GPU app state (contexts, buffers) is lost on
# resume and those apps must reinitialise, but the system actually resumes.
options nvidia NVreg_EnableGpuFirmware=0
