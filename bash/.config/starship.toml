# Two-line prompt — Catppuccin Frappe palette
format = """$directory$git_branch$git_status
$character"""

[directory]
style = "bold #8caaee"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = " on [$symbol$branch]($style)"
style = "#a5adce"

[git_status]
format = " [$all_status$ahead_behind]($style)"
style = "#e5c890"
modified = "!"
untracked = "?"
staged = "+"
ahead = "⇡"
behind = "⇣"

[character]
success_symbol = "[❯](#a6d189)"
error_symbol = "[❯](#e78284)"
